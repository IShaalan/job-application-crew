# Bullet Library
# This file contains proven resume bullets with ratings from past applications.
# Bullets are added automatically during the retrospective phase or imported from past resumes.
#
# Variables used in seed examples:
#   {product}    - Product or feature name
#   {N}          - Numeric value (users, percentage, etc.)
#   {timeframe}  - Time period (e.g., "18 months", "Q3 2024")
#   {outcome}    - Business result or metric
#   {tool}       - Tool, framework, or technology name
#   {team_size}  - Number of people on the team
#   {company}    - Company or organization name

metadata:
  created_at: null  # Will be set when first populated
  total_bullets: 0
  by_quality:
    high: 0
    medium: 0
    low: 0
  last_updated: null

# Bullet structure:
#
#   - id: "category-subcategory-NNN"
#     text: "The bullet text with {variables} for templating"
#     tags: [tag1, tag2, tag3]
#     source_role: "Role title"
#     source_company: "Company name"
#     source_files: ["resume-v3.txt"]
#     times_used: 5
#     human_rating: "approved_no_changes"  # approved_no_changes | approved_with_edits | rejected | imported
#     estimated_quality: "high"  # high | medium | low
#     notes: "Context on when this bullet works best"
#     created_at: "2024-01-15T10:00:00Z"
#     last_used: "2024-06-01"
#     edit_history:
#       - original: "original text if edited"
#         feedback: "why it was edited"

