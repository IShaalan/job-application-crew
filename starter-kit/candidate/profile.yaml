# Candidate Profile — Career Data
# Generated by /job-application init, or fill in manually.
# Contact info and preferences live in resume-config.yaml (not here).

# Provide a few summary variants so the plugin can pick the best fit per role type.
# These are starting points — the plugin will tailor the summary further per application.
summary:
  default: |
    [Your title] with [X] years building [what you build].
    Specialized in [your differentiator]. Track record of [key impact metric].

  themes:
    ai_pm: |
      [Adjust for AI-focused PM roles: emphasize LLMs, agents, model evaluation, etc.]

    technical_pm: |
      [Adjust for technical PM roles: emphasize engineering background, APIs, platform work, etc.]

    enterprise_pm: |
      [Adjust for enterprise roles: emphasize scale, security, compliance, stakeholder management, etc.]

    leadership: |
      [Adjust for leadership/management roles: emphasize team size, org influence, strategy, etc.]

# List ALL roles in reverse chronological order.
# For each PM role: include 3-4 strong bullets with metrics.
# For old non-PM roles (engineering, sales, etc.): include 1 bullet or none — title/company/dates establish your foundation.
experience:
  - company: "Most Recent Company"
    title: "Your Title"
    location: "City, Country"
    start_date: "2023-01"           # YYYY-MM format
    end_date: "present"             # or YYYY-MM
    notes: |
      [Optional: context about the company, product, or team — not shown on resume but helps the AI.]
    bullets:
      - text: "Led X to achieve Y result, delivering Z business impact."
        tags: [relevant, keywords]
        metrics: "the key metric in this bullet"
      - text: "Built [product/feature] that [outcome] for [audience]."
        tags: [product, cross-functional]
        metrics: "metric"
      - text: "Defined and executed [strategy] that [result]."
        tags: [strategy, leadership]
        metrics: "metric"
    narratives:
      - title: "Short name for this achievement"
        story: "The full narrative context..."
        challenge: "What made this hard..."
        approach: "How you approached it..."
        outcome: "Measurable results..."
        learnings: "What you'd do differently or what you proved..."

  - company: "Previous Company"
    title: "Your Title"
    location: "City, Country"
    start_date: "2020-01"
    end_date: "2022-12"
    notes: ""
    bullets:
      - text: "Add bullets here."
        tags: []
        metrics: ""
    narratives: []

  # Add more roles following the same pattern...

  # Old non-PM roles (engineering, sales, etc.) — keep simple:
  - company: "Early Career Company"
    title: "Software Engineer"
    location: "City, Country"
    start_date: "2015-06"
    end_date: "2018-01"
    bullets: []    # Title-only — establishes technical foundation
    narratives: []

skills:
  product:
    - Product Strategy & Vision
    - Roadmap Development
    - OKRs & KPIs
    - B2B SaaS
    - 0-to-1 Product Development
    # Add or remove skills as relevant

  technical:
    - Generative AI / LLMs
    # Add your technical skills

  tools:
    - Mixpanel
    - Jira
    # Add your tools

  leadership:
    - Cross-functional Leadership
    - Stakeholder Management
    # Add your leadership skills

  domains:
    - AI/ML Products
    # Add your industry/domain expertise

education:
  - institution: "University Name"
    degree: "Degree (e.g., MBA, BSc Computer Science)"
    graduation: "2020"
    highlights: []    # Optional: thesis, honors, relevant coursework

certifications:
  - name: "Certification Name"
    issuer: "Issuer"
    date: "2021"
  # Add or remove as needed

# Side projects, open source, anything that shows a "builder" mindset
projects:
  - name: "Project Name"
    url: "yourproject.com"
    description: "What it does and why you built it."
    technologies: [AI, SaaS]
    impact: "Who uses it or what impact it's had."
    role: "Your role (e.g., Founder & PM)"

# Optional: consulting, advisory work
consulting:
  - client: "Client Name"
    description: "Brief description of the client."
    focus: "What you advised on."

# Optional: mentoring, speaking, awards — adds credibility
community:
  - role: "Mentor"
    organization: "Organization Name"
    period: "2023"
    impact: "Brief description of your contribution."
